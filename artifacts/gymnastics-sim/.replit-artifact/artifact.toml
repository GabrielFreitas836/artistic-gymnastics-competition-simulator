kind = "web"
previewPath = "/"
title = "WAG Olympics Simulation"
version = "1.0.0"
id = "artifacts/gymnastics-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23631

[services.development]
run = "pnpm --filter @workspace/gymnastics-sim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gymnastics-sim", "run", "build" ]
publicDir = "artifacts/gymnastics-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23631"
BASE_PATH = "/"
